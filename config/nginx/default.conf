# conf.d fragment — loaded by the default nginx.conf inside the container.
# Do NOT add top-level events{} or http{} blocks here; they live in the
# base nginx.conf already.

# [VULN] server_tokens not disabled — nginx version exposed in headers
# server_tokens off;

upstream juiceshop {
    server juiceshop:3000;   # Docker DNS — resolves via service name on dmz network
}

server {
    listen 80;
    server_name _;

    # [VULN] no rate limiting block — brute-force possible on /rest/user/login
    # limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    location / {
        proxy_pass http://juiceshop;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # [VULN] no security headers set
        # add_header X-Frame-Options        "SAMEORIGIN";
        # add_header X-Content-Type-Options "nosniff";
        # add_header Content-Security-Policy "default-src 'self'";
    }
}